<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기 - 제휴 문의 및 댓글</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="theme-controls">
    <h2 id="theme-title">라이트 모드</h2>
    <button id="theme-toggle">다크 모드로 전환</button>
  </div>

  <main class="content-wrapper">
    <!-- 로또 섹션 -->
    <section class="lotto-section">
      <h1>로또 번호 생성기</h1>
      <div id="lotto-container">
        <div class="placeholder">버튼을 눌러 번호를 추첨하세요!</div>
      </div>
      <button id="draw-btn">번호 추첨하기</button>
    </section>

    <div class="divider"></div>

    <!-- 제휴 문의 섹션 -->
    <section class="contact-section">
      <h2>🤝 제휴 및 협업 문의</h2>
      <p class="contact-desc">서비스 제휴 제안이나 협업 문의를 남겨주시면 확인 후 연락드리겠습니다.</p>
      
      <form action="https://formspree.io/f/mbdqkzqk" method="POST" class="contact-form">
        <div class="form-group">
          <label for="name">성함 / 업체명</label>
          <input type="text" id="name" name="name" placeholder="성함 또는 업체명을 입력해주세요" required>
        </div>
        
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="email" placeholder="답변받으실 이메일을 입력해주세요" required>
        </div>
        
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="5" placeholder="제휴 제안 내용을 상세히 입력해주세요" required></textarea>
        </div>
        
        <button type="submit" class="submit-btn">문의 내용 전송하기</button>
      </form>
    </section>

    <div class="divider"></div>

    <!-- 댓글 섹션 -->
    <section class="comment-section">
      <h2>💬 댓글</h2>
      <div id="disqus_thread"></div>
    </section>
  </main>

  <script>
    /**
    *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
    *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
    var disqus_config = function () {
      this.page.url = window.location.href;  // Replace PAGE_URL with your page's canonical URL variable
      this.page.identifier = window.location.pathname; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
    };
    (function() { // DON'T EDIT BELOW THIS LINE
      var d = document, s = d.createElement('script');
      s.src = 'https://product-builder-lecture.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
  <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
