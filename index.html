<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Generator - Theme Demo</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="theme-controls">
    <h2 id="theme-title">Light Mode</h2>
    <button id="theme-toggle">Switch to Dark Mode</button>
  </div>

  <main class="lotto-wrapper">
    <h1>Lotto Number Generator</h1>
    <div id="lotto-container">
      <!-- Balls will be injected here -->
      <div class="placeholder">Press the button to draw!</div>
    </div>
    <button id="draw-btn">Draw Numbers</button>
  </main>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
