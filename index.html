<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기 - 테마 데모</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="theme-controls">
    <h2 id="theme-title">라이트 모드</h2>
    <button id="theme-toggle">다크 모드로 전환</button>
  </div>

  <main class="lotto-wrapper">
    <h1>로또 번호 생성기</h1>
    <div id="lotto-container">
      <!-- 번호 공이 여기에 생성됩니다 -->
      <div class="placeholder">버튼을 눌러 번호를 추첨하세요!</div>
    </div>
    <button id="draw-btn">번호 추첨하기</button>
  </main>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
